services:
  llm-multiroute:
    build: ./llm-multiroute
    container_name: llm-multiroute
    ports:
      - "8080:8080"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://openrouter.ai/api/v1}
      - OPENAI_TEMPERATURE=${OPENAI_TEMPERATURE:-0.7}
      - OPENAI_MODEL_CLASSIFY=${OPENAI_MODEL_CLASSIFY:-stepfun/step-3.5-flash:free}
      - OPENAI_MODEL_SENTIMENT=${OPENAI_MODEL_SENTIMENT:-z-ai/glm-4.5-air:free}
      - OPENAI_MODEL_SUMMARIZE=${OPENAI_MODEL_SUMMARIZE:-nvidia/nemotron-3-super-120b-a12b:free}
      - OPENAI_MODEL_INTENT=${OPENAI_MODEL_INTENT:-arcee-ai/trinity-large-preview:free}
      - SERVER_PORT=8080
    networks:
      - llm-network

  llm-frontend-python:
    build: ./llm-frontend-python
    container_name: llm-frontend-python
    ports:
      - "5000:5000"
    environment:
      - BACKEND_URL=http://llm-multiroute:8080
      - FLASK_PORT=5000
      - FLASK_DEBUG=false
    depends_on:
      - llm-multiroute
    networks:
      - llm-network

networks:
  llm-network:
    driver: bridge
